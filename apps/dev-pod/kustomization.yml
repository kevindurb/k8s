---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev-pod
namePrefix: dev-pod-

resources:
  - ./deployment.yml

components:
  - ../../components/http-route-refs
  - ../../components/app-pod-hardening
  - ../../components/app-tmp-dirs

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: dev-pod
