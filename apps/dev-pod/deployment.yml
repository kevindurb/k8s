---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels: &labels
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      hostname: dev-pod
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: home
      containers:
        - name: app
          image: ghcr.io/kevindurb/box
          env:
            - name: TZ
              value: America/Denver
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-auth-key
                  key: TS_AUTHKEY
          volumeMounts:
            - name: home
              mountPath: /home/kevindurb
          resources:
            requests:
              memory: 128M
            limits:
              memory: 1G

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home
  labels:
    app.kubernetes.io/component: app
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-replicated
  resources:
    requests:
      storage: 10G

---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: ts-auth-key
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    app.kubernetes.io/component: app
spec:
  organizationId: 575f69b2-49f4-456d-bd6f-b14101103188
  secretName: ts-auth-key
  map:
    - secretKeyName: TS_AUTHKEY
      bwSecretId: 3a7e3a83-5e8a-4d18-97ea-b478012bce6a
  authToken:
    secretName: bw-auth-token
    secretKey: token
