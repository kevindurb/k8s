---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
spec:
  template:
    spec:
      containers:
        - name: app
          image: docker.io/library/nextcloud:33-apache@sha256:d53f6cb35b0712aa890a5e4a8ca21043d6fcd390f38c55b710816dd7cbc2edc0
          env:
            - name: TZ
              value: America/Denver
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: nextcloud.beaver-cloud.xyz nextcloud-app-service.nextcloud
            - name: TRUSTED_PROXIES
              value: 127.0.0.1 10.0.0.0/8
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_HOST
              value: nextcloud-postgres-service.nextcloud
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
