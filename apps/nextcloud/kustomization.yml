---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nextcloud
namePrefix: nextcloud-

resources:
  - ../../bases/postgres
  - ../../bases/valkey
  - ./app

components:
  - ../../components/internal-http-route

replacements:
  - sourceValue: nextcloud.beaver-cloud.xyz
    targets:
      - select:
          kind: HTTPRoute
        fieldPaths:
          - spec.hostnames.0

configMapGenerator:
  - files:
      - nextcloud.yml=gatus.yml
    name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: nextcloud
