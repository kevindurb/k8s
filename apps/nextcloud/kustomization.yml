---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nextcloud
namePrefix: nextcloud-

resources:
  - ../../bases/postgres
  - ../../bases/valkey
  - ./deployment.yml

components:
  - ../../components/app-service
  - ../../components/app-volume
  - ../../components/internal-http-route
  - ../../components/pod-hardening
  - ../../components/tmpdirs

replacements:
  - sourceValue: nextcloud.beaver-cloud.xyz
    targets:
      - select:
          kind: HTTPRoute
        fieldPaths:
          - spec.hostnames.0
  - sourceValue: 10G
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: app-volume
        fieldPaths:
          - spec.resources.requests.storage

configMapGenerator:
  - files:
      - nextcloud.yml=gatus.yml
    name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: nextcloud
