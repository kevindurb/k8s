---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nextcloud
namePrefix: nextcloud-

resources:
  - ./nextcloud.yml
  - ../../bases/postgres

components:
  - ../../components/nas-media
  - ../../components/pod-hardening
  - ../../components/tmpdirs
  - ../../components/bitwarden-secret-name-reference

configMapGenerator:
  - files:
      - nextcloud.yml=gatus.yml
    name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: nextcloud
