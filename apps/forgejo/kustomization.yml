---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgejo
namePrefix: forgejo-

resources:
  - ../../bases/app-with-storage

components:
  - ../../components/internal-http-route
  - ../../components/app-env

images:
  - name: app-image
    newName: codeberg.org/forgejo/forgejo
    newTag: 15-rootless@sha256:4f4d168b4e792d0f73e5f4da0548f3b54b9c9d03fb85f277c97eb985cb9a290a

configMapGenerator:
  - name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'
    files:
      - forgejo.yml=gatus.yml
  - name: app-env
    literals:
      - USER_UID=1000
      - USER_GID=1000

replacements:
  - sourceValue: '3000'
    targets:
      - select: &app-deployment
          kind: Deployment
          name: app-deployment
        fieldPaths:
          - spec.template.spec.containers.[name=app].ports.[name=http].containerPort
  - sourceValue: forgejo.beaver-cloud.xyz
    targets:
      - select:
          kind: HTTPRoute
        fieldPaths:
          - spec.hostnames.0
  - sourceValue: 10G
    targets:
      - select:
          kind: PersistentVolumeClaim
          name: app-volume
        fieldPaths:
          - spec.resources.requests.storage
  - sourceValue: /var/lib/gitea
    targets:
      - select: *app-deployment
        fieldPaths:
          - spec.template.spec.containers.0.volumeMounts.[name=volume].mountPath

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: forgejo
