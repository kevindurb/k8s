---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scrypted
namePrefix: scrypted-

resources:
  - ./scrypted.yml

components:
  - ../../components/nas-media
  - ../../components/pod-hardening
  - ../../components/tmpdirs

configMapGenerator:
  - files:
      - scrypted.yml=gatus.yml
    name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: scrypted
