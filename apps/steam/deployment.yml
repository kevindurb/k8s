---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels: &labels
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      hostIPC: true
      hostNetwork: true
      hostname: steam
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-GeForce-GTX-1060-6GB-SHARED
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2G
        - name: dri
          hostPath:
            path: /dev/dri
      containers:
        - name: app
          image: lscr.io/linuxserver/steam:latest
          securityContext:
            privileged: true
            seccompProfile:
              type: Unconfined
          resources:
            requests:
              memory: 1G
            limits:
              memory: 4G
              nvidia.com/gpu: '1'
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: TZ
              value: America/Denver
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: PIXELFLUX_WAYLAND
              value: 'true'
            - name: DRINODE
              value: /dev/dri/renderD128
            - name: DRI_NODE
              value: /dev/dri/renderD128
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: 'graphics,compute,display,utility'
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: dri
              mountPath: /dev/dri

---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  labels: &labels
    app.kubernetes.io/component: app
spec:
  selector: *labels
  ports:
    - name: http
      port: 80
      targetPort: http

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: internal-route
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal-beaver-cloud
      namespace: envoy-gateway-system
  hostnames:
    - steam.beaver-cloud.xyz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: app-service
          port: 80
          weight: 1
