---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shiori
  namespace: argocd
spec:
  project: apps
  sources:
    - repoURL: https://github.com/kevindurb/k8s.git
      targetRevision: HEAD
      path: apps/shiori
  destination:
    server: https://kubernetes.default.svc
    namespace: shiori
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
      prune: false
      selfHeal: true
