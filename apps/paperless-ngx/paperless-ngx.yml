---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  annotations:
    reloader.stakater.com/auto: 'true'
  labels: &labels
    app.kubernetes.io/component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      securityContext:
        fsGroup: 1000
      volumes:
        - name: volume
          persistentVolumeClaim:
            claimName: volume
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:latest@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
          securityContext:
            privileged: false
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 100M
            limits:
              memory: 1G
          volumeMounts:
            - name: volume
              mountPath: /usr/src/paperless/data
            - name: nas-media
              mountPath: /usr/src/paperless/media
              subPath: paperless/media
            - name: nas-media
              mountPath: /usr/src/paperless/export
              subPath: paperless/export
            - name: nas-media
              mountPath: /usr/src/paperless/consume
              subPath: paperless/consume
          env:
            - name: TZ
              value: America/Denver
            - name: USERMAP_UID
              value: '1000'
            - name: USERMAP_GID
              value: '1000'
            - name: PAPERLESS_REDIS
              value: redis://paperless-ngx-valkey-service.paperless-ngx:6379
            - name: PAPERLESS_URL
              value: https://paperless.beaver-cloud.xyz
          ports:
            - name: http
              containerPort: 8000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: volume
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-replicated
  resources:
    requests:
      storage: 10G

---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  selector:
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
