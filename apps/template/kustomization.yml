---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: template
namePrefix: template-

resources:
  - ../../bases/app-with-storage

components:
  - ../../components/internal-http-route
  - ../../components/external-http-route

images:
  - name: app-image
    newName: docker.io/traefik/whoami
    newTag: v1.11@sha256:200689790a0a0ea48ca45992e0450bc26ccab5307375b41c84dfc4f2475937ab

configMapGenerator:
  - name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'
    files:
      - template.yml=gatus.yml

replacements:
  - sourceValue: template.beaver-cloud.xyz
    targets:
      - select:
          kind: HTTPRoute
        fieldPaths:
          - spec.hostnames.0

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: template
