---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: template
namePrefix: template-

resources:
  - ../../bases/app-with-storage

images:
  - name: app-image
    newName: docker.io/traefik/whoami
    newTag: v1.11

configMapGenerator:
  - name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'
    files:
      - template.yml=gatus.yml

replacements:
  - sourceValue: template.beaver-cloud.xyz
    targets:
      - select:
          kind: Ingress
        fieldPaths:
          - spec.rules.0.host
          - spec.tls.0.hosts.0
          - spec.tls.0.secretName

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: template
