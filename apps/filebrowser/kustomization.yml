---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: filebrowser
namePrefix: filebrowser-

resources:
  - ../../bases/app-with-storage

components:
  - ../../components/app-nas-media
  - ../../components/internal-http-route

images:
  - name: app-image
    newName: ghcr.io/gtsteffaniak/filebrowser
    newTag: 1.3.0-beta

configMapGenerator:
  - name: config
    files:
      - ./config/config.yaml
  - name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'
    files:
      - filebrowser.yml=gatus.yml

replacements:
  - sourceValue: filebrowser.beaver-cloud.xyz
    targets:
      - select:
          kind: HTTPRoute
        fieldPaths:
          - spec.hostnames.0

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: config-map
          configMap:
            name: config
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: config-map
          mountPath: /home/filebrowser/data/config.yaml
          subPath: config.yaml
    target:
      kind: Deployment
      name: app-deployment

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: filebrowser
