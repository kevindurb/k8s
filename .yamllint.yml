---
extends: default

rules:
  document-start:
    present: true
    level: error
  comments-indentation: false
  comments:
    min-spaces-from-content: 1
  line-length:
    max: 150
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: false
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
