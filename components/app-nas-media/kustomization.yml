---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

components:
  - ../nas-media

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/volumes/0
        value:
          name: nas-media
          persistentVolumeClaim:
            claimName: nas-media
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/0
        value:
          name: nas-media
          mountPath: /media
    target:
      kind: Deployment
      name: app-deployment
