---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: false
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          privileged: false
          runAsNonRoot: false
    target:
      kind: Deployment
