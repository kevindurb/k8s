apiVersion: v1
data:
  ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED: "true"
  ZIGBEE2MQTT_CONFIG_FRONTEND_URL: https://zigbee2mqtt.beaver-cloud.xyz
  ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
  ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC: zigbee2mqtt
  ZIGBEE2MQTT_CONFIG_MQTT_SERVER: mqtt://mosquitto-app-service.mosquitto:1883
  ZIGBEE2MQTT_CONFIG_PERMIT_JOIN: "true"
  ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: zstack
  ZIGBEE2MQTT_CONFIG_SERIAL_PORT: /dev/ttyACM0
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: zigbee2mqtt
  name: zigbee2mqtt-app-env-c74gf4f8kt
  namespace: zigbee2mqtt
---
apiVersion: v1
data:
  zigbee2mqtt.yml: |
    ---
    endpoints:
      - name: zigbee2mqtt
        group: platform
        url: http://zigbee2mqtt-app-service.zigbee2mqtt
        conditions:
          - '[STATUS] == 200'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: zigbee2mqtt
    gatus.io/enabled: "true"
  name: zigbee2mqtt-gatus-ck6tgcdm9t
  namespace: zigbee2mqtt
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: zigbee2mqtt
  name: zigbee2mqtt-app-service
  namespace: zigbee2mqtt
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: zigbee2mqtt
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: zigbee2mqtt
  name: zigbee2mqtt-app-volume
  namespace: zigbee2mqtt
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1G
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: zigbee2mqtt
  name: zigbee2mqtt-app-deployment
  namespace: zigbee2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: zigbee2mqtt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: zigbee2mqtt
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        envFrom:
        - configMapRef:
            name: zigbee2mqtt-app-env-c74gf4f8kt
        image: ghcr.io/koenkk/zigbee2mqtt:latest@sha256:2a21bbf7a664a149024bbe1f776e3151f28ed9db15948270dcbffb89544a41f0
        name: app
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            memory: 500M
          requests:
            memory: 50M
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /app/data
          name: volume
        - mountPath: /run/udev
          name: run-udev
          readOnly: true
        - mountPath: /dev/ttyACM0
          name: zigbee-dongle
      hostname: zigbee2mqtt
      nodeSelector:
        feature.node.kubernetes.io/usb-ff_10c4_ea60.present: "true"
      securityContext:
        fsGroup: 1000
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: zigbee2mqtt-app-volume
      - hostPath:
          path: /dev/serial/by-id/usb-ITead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_dadea32ebf12ec11b8b720c7bd930c07-if00-port0
        name: zigbee-dongle
      - hostPath:
          path: /run/udev
        name: run-udev
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: zigbee2mqtt
  name: zigbee2mqtt-internal-route
  namespace: zigbee2mqtt
spec:
  hostnames:
  - zigbee2mqtt.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: zigbee2mqtt-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
