apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: generic-device-plugin
  name: generic-device-plugin
  namespace: generic-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: generic-device-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: generic-device-plugin
    spec:
      containers:
      - args:
        - --device
        - |
          name: serial
          groups:
            - paths:
                - path: /dev/ttyUSB*
            - paths:
                - path: /dev/ttyACM*
            - paths:
                - path: /dev/tty.usb*
            - paths:
                - path: /dev/cu.*
            - paths:
                - path: /dev/cuaU*
            - paths:
                - path: /dev/rfcomm*
        - --device
        - |
          name: video
          groups:
            - paths:
                - path: /dev/video0
        - --device
        - |
          name: fuse
          groups:
            - count: 10
              paths:
                - path: /dev/fuse
        - --device
        - |
          name: audio
          groups:
            - count: 10
              paths:
                - path: /dev/snd
        - --device
        - |
          name: capture
          groups:
            - paths:
                - path: /dev/snd/controlC0
                - path: /dev/snd/pcmC0D0c
            - paths:
                - path: /dev/snd/controlC1
                  mountPath: /dev/snd/controlC0
                - path: /dev/snd/pcmC1D0c
                  mountPath: /dev/snd/pcmC0D0c
            - paths:
                - path: /dev/snd/controlC2
                  mountPath: /dev/snd/controlC0
                - path: /dev/snd/pcmC2D0c
                  mountPath: /dev/snd/pcmC0D0c
            - paths:
                - path: /dev/snd/controlC3
                  mountPath: /dev/snd/controlC0
                - path: /dev/snd/pcmC3D0c
                  mountPath: /dev/snd/pcmC0D0c
        image: squat/generic-device-plugin:0.2.0
        name: generic-device-plugin
        ports:
        - containerPort: 8080
          name: http
        resources:
          limits:
            cpu: 50m
            memory: 20Mi
          requests:
            cpu: 50m
            memory: 10Mi
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /var/lib/kubelet/device-plugins
          name: device-plugin
        - mountPath: /dev
          name: dev
      priorityClassName: system-node-critical
      tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists
      volumes:
      - hostPath:
          path: /var/lib/kubelet/device-plugins
        name: device-plugin
      - hostPath:
          path: /dev
        name: dev
  updateStrategy:
    type: RollingUpdate
