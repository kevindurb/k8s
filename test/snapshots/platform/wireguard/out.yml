  INTERNAL_SUBNET: 10.100.100.0
  LOG_CONFS: "true"
  PEERDNS: 192.168.42.53
  PEERS: workmac,corella
  PERSISTENTKEEPALIVE_PEERS: all
  PGID: "1000"
  PUID: "1000"
  SERVERURL: home.beaver-cloud.xyz
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: wireguard
  name: wireguard-app-env-hcc646bcd9
  namespace: wireguard
---
apiVersion: v1
data:
  wireguard.yml: |
    ---
    endpoints:
      - name: wireguard
        group: platform
        url: udp://wireguard-app-service.wireguard:51820
        conditions:
          - '[CONNECTED] == true'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: wireguard
    gatus.io/enabled: "true"
  name: wireguard-gatus-gfbddk2528
  namespace: wireguard
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: wireguard
  name: wireguard-app-service
  namespace: wireguard
spec:
  loadBalancerIP: 192.168.42.7
  ports:
  - name: wg
    port: 51820
    protocol: UDP
    targetPort: wg
  selector:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: wireguard
  type: LoadBalancer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: wireguard
  name: wireguard-app-volume
  namespace: wireguard
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1G
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: wireguard
  name: wireguard-app-deployment
  namespace: wireguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: wireguard
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: wireguard
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        envFrom:
        - configMapRef:
            name: wireguard-app-env-hcc646bcd9
        image: lscr.io/linuxserver/wireguard:latest@sha256:b199fa09846365caec217ebf9cbf839a22b7bf836acfd367a59ed52b6984f174
        name: app
        ports:
        - containerPort: 51820
          name: wg
          protocol: UDP
        resources:
          limits:
            memory: 1G
          requests:
            memory: 100M
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /config
          name: volume
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/tmp
          name: var-tmp
        - mountPath: /var/run
          name: var-run
        - mountPath: /var/cache
          name: var-cache
        - mountPath: /var/log
          name: var-log
      securityContext:
        fsGroup: 1000
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: wireguard-app-volume
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: var-tmp
      - emptyDir: {}
        name: var-run
      - emptyDir: {}
        name: var-cache
      - emptyDir: {}
        name: var-log
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: external.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: wireguard
  name: wireguard-external-home
  namespace: wireguard
spec:
  endpoints:
  - dnsName: home.beaver-cloud.xyz
    recordType: A
    targets:
    - 76.120.35.232
---
