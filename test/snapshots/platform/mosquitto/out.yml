apiVersion: v1
data:
  mosquitto.yml: |
    ---
    endpoints:
      - name: mosquitto
        url: tcp://mosquitto-service.mosquitto:1883
        group: platform
        conditions:
          - '[CONNECTED] == true'
          - '[RESPONSE_TIME] < 500'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: mosquitto
    gatus.io/enabled: "true"
  name: mosquitto-gatus-589g869g5d
  namespace: mosquitto
---
apiVersion: v1
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous true
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
    connection_messages true
    max_keepalive 60
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: mosquitto
  name: mosquitto-mosquitto-config-bkk7tc8kf9
  namespace: mosquitto
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: mosquitto
  name: mosquitto-service
  namespace: mosquitto
spec:
  ports:
  - name: mqtt
    port: 1883
    targetPort: mqtt
  selector:
    app.kubernetes.io/name: mosquitto
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: mosquitto
  name: mosquitto-volume
  namespace: mosquitto
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1G
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: mosquitto
  name: mosquitto-deployment
  namespace: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosquitto
    spec:
      containers:
      - image: docker.io/library/eclipse-mosquitto@sha256:a908c65cc8e67ec9d292ef27c2c0360dbaaee7eb1b935cdd194e67697f15dea1
        livenessProbe:
          initialDelaySeconds: 5
          periodSeconds: 30
          tcpSocket:
            port: mqtt
        name: app
        ports:
        - containerPort: 1883
          name: mqtt
        resources:
          limits:
            memory: 128M
          requests:
            memory: 32M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /mosquitto/config
          name: mosquitto-config
          readOnly: true
        - mountPath: /mosquitto/data
          name: volume
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/tmp
          name: var-tmp
        - mountPath: /var/run
          name: var-run
        - mountPath: /var/cache
          name: var-cache
        - mountPath: /var/log
          name: var-log
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: mosquitto-volume
      - configMap:
          name: mosquitto-mosquitto-config-bkk7tc8kf9
        name: mosquitto-config
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: var-tmp
      - emptyDir: {}
        name: var-run
      - emptyDir: {}
        name: var-cache
      - emptyDir: {}
        name: var-log
