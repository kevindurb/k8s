apiVersion: v1
data:
  scrypted.yml: |
    ---
    endpoints:
      - name: scrypted
        group: apps
        url: http://scrypted-app-service.scrypted
        conditions:
          - '[STATUS] == 200'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: scrypted
    gatus.io/enabled: "true"
  name: scrypted-gatus-8gk7g7c4h7
  namespace: scrypted
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: scrypted
  name: scrypted-app-service
  namespace: scrypted
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: scrypted
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: scrypted
  name: scrypted-volume
  namespace: scrypted
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10G
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: scrypted
  name: scrypted-web-deployment
  namespace: scrypted
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/name: scrypted
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: scrypted
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        image: ghcr.io/koush/scrypted:v0.144.1-noble-nvidia@sha256:da86752279289444ba093caf908c2534abbdf134058143755cd0b085bd88b47c
        name: scrypted
        ports:
        - containerPort: 11080
          name: http
        resources:
          limits:
            memory: 4G
            nvidia.com/gpu: "1"
          requests:
            memory: 100M
        volumeMounts:
        - mountPath: /server/volume
          name: volume
      hostNetwork: true
      nodeSelector:
        nvidia.com/gpu.product: Quadro-P620-SHARED
      runtimeClassName: nvidia
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: scrypted-volume
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: scrypted
  name: scrypted-internal-route
  namespace: scrypted
spec:
  hostnames:
  - scrypted.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: scrypted-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
