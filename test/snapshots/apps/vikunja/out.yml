apiVersion: v1
data:
  vikunja.yml: |
    ---
    endpoints:
      - name: vikunja
        group: apps
        url: http://vikunja-app-service.vikunja
        conditions:
          - '[STATUS] == 200'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: vikunja
    gatus.io/enabled: "true"
  name: vikunja-gatus-k92tfm74tb
  namespace: vikunja
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: vikunja
  name: vikunja-app-service
  namespace: vikunja
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: vikunja
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: vikunja
  name: vikunja-config
  namespace: vikunja
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: vikunja
  name: vikunja-app-deployment
  namespace: vikunja
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: vikunja
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: vikunja
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        - name: VIKUNJA_SERVICE_PUBLICURL
          value: https://vikunja.beaver-cloud.xyz
        - name: VIKUNJA_SERVICE_ROOTPATH
          value: /config
        - name: VIKUNJA_DATABASE_PATH
          value: /config/vikunja.db
        image: ghcr.io/go-vikunja/vikunja:2
        name: app
        ports:
        - containerPort: 3456
          name: http
        resources:
          limits:
            memory: 256M
          requests:
            memory: 128M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /config
          name: config
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/tmp
          name: var-tmp
        - mountPath: /var/run
          name: var-run
        - mountPath: /var/cache
          name: var-cache
        - mountPath: /var/log
          name: var-log
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: vikunja-config
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: var-tmp
      - emptyDir: {}
        name: var-run
      - emptyDir: {}
        name: var-cache
      - emptyDir: {}
        name: var-log
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: external.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: vikunja
  name: vikunja-external-route
  namespace: vikunja
spec:
  hostnames:
  - vikunja.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: external-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: vikunja-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: vikunja
  name: vikunja-internal-route
  namespace: vikunja
spec:
  hostnames:
  - vikunja.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: vikunja-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
