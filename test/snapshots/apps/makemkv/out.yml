            name: makemkv-app-env-59c5mt66t6
        image: jlesage/makemkv:v26.01.2@sha256:4c114cfbd0ba7feef85c72d1721b8ea13a44ebc010b4996b644e618906e61717
        name: app
        ports:
        - containerPort: 5800
          name: http
        resources:
          limits:
            memory: 1G
          requests:
            memory: 100M
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /output
          name: nas-media
          subPath: Downloads
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/tmp
          name: var-tmp
        - mountPath: /var/run
          name: var-run
        - mountPath: /var/cache
          name: var-cache
        - mountPath: /var/log
          name: var-log
      nodeSelector:
        kubernetes.io/hostname: drone-04
      securityContext:
        fsGroup: 1000
      volumes:
      - name: nas-media
        persistentVolumeClaim:
          claimName: makemkv-nas-media
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: var-tmp
      - emptyDir: {}
        name: var-run
      - emptyDir: {}
        name: var-cache
      - emptyDir: {}
        name: var-log
