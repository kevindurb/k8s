      app.kubernetes.io/name: makemkv
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: makemkv
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        envFrom:
