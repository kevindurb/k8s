apiVersion: v1
data:
  omada.yml: |
    ---
    endpoints:
      - name: omada
        url: https://omada-app-service.omada/login
        group: apps
        client:
          insecure: true
        conditions:
          - '[STATUS] == 200'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: omada
    gatus.io/enabled: "true"
  name: omada-gatus-5dcm9249f2
  namespace: omada
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: omada
  name: omada-app-service
  namespace: omada
spec:
  ports:
  - name: https
    port: 443
    targetPort: https
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: omada
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: omada
  name: omada-volume
  namespace: omada
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10G
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: omada
  name: omada-web-deployment
  namespace: omada
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/name: omada
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: omada
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        - name: PUID
          value: "508"
        - name: PGID
          value: "508"
        - name: MANAGE_HTTP_PORT
          value: "8088"
        - name: MANAGE_HTTPS_PORT
          value: "8043"
        - name: PORTAL_HTTP_PORT
          value: "8888"
        - name: PORTAL_HTTPS_PORT
          value: "8843"
        - name: PORT_APP_DISCOVERY
          value: "27001"
        - name: PORT_ADOPT_V1
          value: "29812"
        - name: PORT_UPGRADE_V1
          value: "29813"
        - name: PORT_MANAGER_V1
          value: "29811"
        - name: PORT_MANAGER_V2
          value: "29814"
        - name: PORT_DISCOVERY
          value: "29810"
        - name: SHOW_SERVER_LOGS
          value: "true"
        - name: SHOW_MONGODB_LOGS
          value: "false"
        - name: SSL_CERT_NAME
          value: tls.crt
        - name: SSL_KEY_NAME
          value: tls.key
        image: mbentley/omada-controller:beta-5.14.30.7@sha256:1ef5fa0a27fefa44a3a991553dc930a376f039a4c13c0fd5b60b0b14f241fe3b
        name: omada
        ports:
        - containerPort: 8043
          name: https
        resources:
          limits:
            memory: 4G
          requests:
            memory: 100M
        volumeMounts:
        - mountPath: /opt/tplink/EAPController/data
          name: volume
          subPath: data
        - mountPath: /opt/tplink/EAPController/logs
          name: volume
          subPath: logs
      hostNetwork: true
      securityContext:
        fsGroup: 1000
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: omada-volume
