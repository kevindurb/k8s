apiVersion: v1
data:
  sonarr.yml: |
    ---
    endpoints:
      - name: sonarr
        group: apps
        url: http://sonarr-app-service.sonarr
        conditions:
          - '[STATUS] == 200'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: sonarr
    gatus.io/enabled: "true"
  name: sonarr-gatus-t7t8bdfbdf
  namespace: sonarr
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: sonarr
  name: sonarr-app-service
  namespace: sonarr
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: sonarr
---
apiVersion: v1
kind: PersistentVolume
metadata:
  labels:
    app.kubernetes.io/name: sonarr
  name: sonarr-nas-media
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 12Ti
  mountOptions:
  - nfsvers=4.2
  nfs:
    path: /
    server: 192.168.42.24
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: sonarr
  name: sonarr-nas-media
  namespace: sonarr
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 12Ti
  storageClassName: ""
  volumeName: sonarr-nas-media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/name: sonarr
  name: sonarr-volume
  namespace: sonarr
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10G
  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: sonarr
    beaver-cloud.xyz/nas-media: "true"
  name: sonarr-web-deployment
  namespace: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/name: sonarr
      beaver-cloud.xyz/nas-media: "true"
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: sonarr
        beaver-cloud.xyz/nas-media: "true"
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        image: ghcr.io/home-operations/sonarr:4.0.16@sha256:22651c750eedb091f6d76ade95dbecae0eeafe2b55432c3b8d8b042e8745f344
        name: sonarr
        ports:
        - containerPort: 8989
          name: http
        resources:
          limits:
            memory: 4G
          requests:
            memory: 100M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /media
          name: nas-media
        - mountPath: /config
          name: volume
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/tmp
          name: var-tmp
        - mountPath: /var/run
          name: var-run
        - mountPath: /var/cache
          name: var-cache
        - mountPath: /var/log
          name: var-log
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: nas-media
        persistentVolumeClaim:
          claimName: sonarr-nas-media
      - name: volume
        persistentVolumeClaim:
          claimName: sonarr-volume
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: var-tmp
      - emptyDir: {}
        name: var-run
      - emptyDir: {}
        name: var-cache
      - emptyDir: {}
        name: var-log
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: sonarr
  name: sonarr-internal-route
  namespace: sonarr
spec:
  hostnames:
  - sonarr.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: sonarr-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
