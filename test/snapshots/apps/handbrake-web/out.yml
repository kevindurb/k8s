---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: handbrake-web
  name: handbrake-web-server-deployment
  namespace: handbrake-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/name: handbrake-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/name: handbrake-web
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        image: ghcr.io/thenickoftime/handbrake-web-server@sha256:6aa18122e08299cf05edf0aa6135d9c97d92839933f5377f8fde59978430e543
        name: handbrake-web-server
        ports:
        - containerPort: 9999
          name: http
        resources:
          limits:
            memory: 1G
          requests:
            memory: 100M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /data
          name: volume
        - mountPath: /video
          name: video
        - mountPath: /data/config.yaml
          name: config
          subPath: config.yaml
        - mountPath: /data/presets/super_hq_h265_mkv.json
          name: config
          subPath: super_hq_h265_mkv.json
        - mountPath: /tmp
          name: tmp
        - mountPath: /var/tmp
          name: var-tmp
        - mountPath: /var/run
          name: var-run
        - mountPath: /var/cache
          name: var-cache
        - mountPath: /var/log
          name: var-log
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: handbrake-web-volume
      - configMap:
          name: config-map
        name: config-map
      - emptyDir: {}
        name: video
      - configMap:
          name: handbrake-web-config-d4kgmk896g
        name: config
      - emptyDir: {}
        name: tmp
      - emptyDir: {}
        name: var-tmp
      - emptyDir: {}
        name: var-run
      - emptyDir: {}
        name: var-cache
      - emptyDir: {}
        name: var-log
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: worker
    app.kubernetes.io/name: handbrake-web
  name: handbrake-web-worker-deployment
  namespace: handbrake-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/name: handbrake-web
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: handbrake-web
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        - name: SERVER_URL
          value: http://handbrake-web-app-service
        - name: SERVER_PORT
          value: "80"
        - name: WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: ghcr.io/thenickoftime/handbrake-web-worker@sha256:4676054730c16fb7081d7c4f7b546272a022010e8adbb893df9d274885dfbc5e
        name: handbrake-web-worker
        resources:
          limits:
            memory: 8G
          requests:
            memory: 1G
        volumeMounts:
        - mountPath: /data
          name: data
        - mountPath: /video
          name: video
      volumes:
      - emptyDir: {}
        name: data
      - emptyDir: {}
        name: video
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: handbrake-web
  name: handbrake-web-internal-route
  namespace: handbrake-web
spec:
  hostnames:
  - handbrake-web.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: handbrake-web-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
