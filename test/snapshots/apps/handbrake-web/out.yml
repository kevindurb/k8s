kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: handbrake-web
    gatus.io/enabled: "true"
  name: handbrake-web-gatus-k8f48292k5
  namespace: handbrake-web
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: handbrake-web
  name: handbrake-web-app-service
  namespace: handbrake-web
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: web
    app.kubernetes.io/name: handbrake-web
---
apiVersion: v1
kind: PersistentVolume
