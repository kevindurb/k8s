apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/name: healthchecks
  name: healthchecks-cronjob-drone-01
  namespace: healthchecks
spec:
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: healthchecks
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: healthchecks
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - |
              echo "[$(date -Iseconds)] Pinging Healthchecks.io for node ${NODE_NAME}"
              curl -fsS --max-time 10 --retry 3 --retry-delay 5 \
                "https://hc-ping.com/${PING_KEY}/${NODE_NAME}" \
                || echo "Ping failed"
            env:
            - name: PING_KEY
              valueFrom:
                secretKeyRef:
                  key: PING_KEY
                  name: healthchecks-secret
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            image: curlimages/curl:8.18.0@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
            name: pinger
          nodeSelector:
            kubernetes.io/hostname: drone-01
          restartPolicy: Never
  schedule: 6 * * * *
---
