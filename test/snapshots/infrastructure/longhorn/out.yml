apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  labels:
    app.kubernetes.io/name: longhorn-system
  name: daily-backup
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 0 * * *
  groups:
  - default
  labels: {}
  name: daily-backup
  parameters: {}
  retain: 7
  task: backup
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  labels:
    app.kubernetes.io/name: longhorn-system
  name: daily-snapshot-cleanup
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 0 * * *
  groups:
  - default
  labels: {}
  name: daily-snapshot-cleanup
  parameters: {}
  retain: 0
  task: snapshot-cleanup
---
