apiVersion: v1
data:
  pihole.yml: |
    ---
    endpoints:
      - name: pihole
        group: infrastructure
        url: http://pihole-app-service.pihole/admin/login
        conditions:
          - '[STATUS] == 200'

      - name: pihole dns
        url: 192.168.42.53
        group: dns
        dns:
          query-name: cloudflare.com
          query-type: A
        conditions:
          - '[DNS_RCODE] == NOERROR'
          - 'len([BODY]) > 0'
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: pihole
    gatus.io/enabled: "true"
  name: pihole-gatus-7cm6527kf6
  namespace: pihole
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: pihole
  name: pihole-app-service
  namespace: pihole
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: pihole
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: pihole
  name: pihole-dns-service
  namespace: pihole
spec:
  loadBalancerIP: 192.168.42.53
  ports:
  - name: dns
    port: 53
    targetPort: dns
  - name: dns-udp
    port: 53
    protocol: UDP
    targetPort: dns-udp
  selector:
    app.kubernetes.io/name: pihole
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: pihole
  name: pihole-app-deployment
  namespace: pihole
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: pihole
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: pihole
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Denver
        - name: FTLCONF_dns_listeningMode
          value: all
        - name: FTLCONF_webserver_api_password
          valueFrom:
            secretKeyRef:
              key: WEBPASSWORD
              name: pihole-secret
        image: docker.io/pihole/pihole:2025.11.1@sha256:91dc91ddd413bf461c283204558f8f21839851e9824799075a7ceff7c77eea40
        name: pihole
        ports:
        - containerPort: 80
          name: http
        - containerPort: 53
          name: dns
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        resources:
          limits:
            memory: 200M
          requests:
            memory: 130M
      securityContext:
        fsGroup: 1000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: pihole
  name: pihole-internal-route
  namespace: pihole
spec:
  hostnames:
  - pihole.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: pihole-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    app.kubernetes.io/name: pihole
  name: pihole-secret
  namespace: pihole
spec:
  authToken:
    secretKey: token
    secretName: bw-auth-token
  map:
  - bwSecretId: 4064bfb3-c15b-4ba1-b0c5-b34f00ea2db3
    secretKeyName: WEBPASSWORD
  organizationId: 575f69b2-49f4-456d-bd6f-b14101103188
  secretName: pihole-secret
