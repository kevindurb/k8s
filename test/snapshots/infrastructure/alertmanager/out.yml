apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: alertmanager
  name: alertmanager-app-volume
  namespace: alertmanager
spec:
  accessModes:
