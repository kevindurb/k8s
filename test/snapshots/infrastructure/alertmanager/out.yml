apiVersion: v1
data:
  alertmanager.yml: |
    ---
    global:
      smtp_smarthost: smtp-relay-service.smtp-relay:25
      smtp_from: beavercloud@fastmail.com
      smtp_require_tls: false
      smtp_auth_username: ''
      smtp_auth_password: ''
      smtp_auth_identity: ''

    route:
      receiver: 'null'
      routes:
        - group_by: [job, alertname, severity]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: email-alerts
          matchers:
            - alertname != Watchdog
        - receiver: watchdog
          group_wait: 0s
          group_interval: 5m
          repeat_interval: 5m
          matchers:
            - alertname = Watchdog

    receivers:
      - name: 'null'
      - name: email-alerts
        email_configs:
          - to: beavercloud@fastmail.com
            send_resolved: true
      - name: watchdog
        webhook_configs:
          - url_file: /run/secrets/webhook_url
            send_resolved: false
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: alertmanager
  name: alertmanager-config-dfc927m6k4
  namespace: alertmanager
---
apiVersion: v1
data:
  alertmanager.yml: |
    ---
    endpoints:
      - name: alertmanager
        url: http://alertmanager-app-service.alertmanager/-/healthy
        group: infrastructure
        conditions:
          - '[STATUS] == 200'
kind: ConfigMap
metadata:
  labels:
