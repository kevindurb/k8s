  storageClassName: longhorn-replicated
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/name: alertmanager
  name: alertmanager-app-deployment
  namespace: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/name: alertmanager
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/name: alertmanager
    spec:
      containers:
      - args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/alertmanager
        - --web.external-url=https://alertmanager.beaver-cloud.xyz
        env:
        - name: TZ
          value: America/Denver
        envFrom: []
        image: docker.io/prom/alertmanager@sha256:58e117eabccebbff04e6643a3432d6315a2cc3a8c24ab5849bc628886bf08857
        name: alertmanager
        ports:
        - containerPort: 9093
          name: http
        resources:
          limits:
            memory: 500M
          requests:
            memory: 50M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - mountPath: /etc/alertmanager
          name: config-volume
        - mountPath: /alertmanager
          name: data-volume
        - mountPath: /run/secrets/webhook_url
          name: alertmanager-secret
          readOnly: true
          subPath: watchdog-url
      hostname: alertmanager
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: alertmanager-app-volume
      - configMap:
          name: alertmanager-config-dfc927m6k4
        name: config-volume
      - name: alertmanager-secret
        secret:
          secretName: alertmanager-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    internal-dns.alpha.kubernetes.io/target: internal.beaver-cloud.xyz
  labels:
    app.kubernetes.io/name: alertmanager
  name: alertmanager-internal-route
  namespace: alertmanager
spec:
  hostnames:
  - alertmanager.beaver-cloud.xyz
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-beaver-cloud
    namespace: envoy-gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: alertmanager-app-service
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
