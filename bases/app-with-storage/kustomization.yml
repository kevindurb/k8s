---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../app
  - ./pvc.yml

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/volumes/0
        value:
          name: volume
          persistentVolumeClaim:
            claimName: app-volume
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/0
        value:
          name: volume
          mountPath: /config
    target:
      kind: Deployment
      name: app-deployment
