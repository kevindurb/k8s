---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      securityContext: {}
      volumes: []
      containers:
        - name: app
          image: app-image
          envFrom: []
          resources:
            requests:
              memory: 100M
            limits:
              memory: 1G
          volumeMounts: []
          env:
            - name: TZ
              value: America/Denver
          ports:
            - name: http
              containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: service
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
