---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smtp-relay
namePrefix: smtp-relay-

resources:
  - ./smtp-relay.yml

components:
  - ../../components/app-pod-hardening
  - ../../components/app-tmp-dirs

configMapGenerator:
  - name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'
    files:
      - smtp-relay.yml=gatus.yml
  - name: config
    files:
      - ./config/maddy.conf

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: smtp-relay
