---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: address-pool
spec:
  addresses:
    - 192.168.42.3/32 # external gateway
    - 192.168.42.4/32 # internal gateway
    - 192.168.42.7/32 # wireguard
    - 192.168.42.53/32 # pihole

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
spec:
  ipAddressPools:
    - address-pool
