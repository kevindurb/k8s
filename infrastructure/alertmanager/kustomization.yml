---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: alertmanager
namePrefix: alertmanager-

resources:
  - ./alertmanager.yml

components:
  - ../../components/pod-hardening
  - ../../components/internal-http-route
  - ../../components/app-http-service
  - ../../components/prometheus-scrape-app-service
  - ../../components/app-volume

replacements:
  - sourceValue: alertmanager.beaver-cloud.xyz
    targets:
      - select:
          kind: HTTPRoute
        fieldPaths:
          - spec.hostnames.0

configMapGenerator:
  - name: config
    files:
      - ./config/alertmanager.yml
  - name: gatus
    options:
      labels:
        gatus.io/enabled: 'true'
    files:
      - alertmanager.yml=gatus.yml

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: alertmanager
