---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.longhorn.io
      targetRevision: v1.11.1
      chart: longhorn
      helm:
        valuesObject:
          defaultSettings:
            createDefaultDiskLabeledNodes: true
            upgradeChecker: false
          persistence:
            defaultClass: false
            dataEngine: v1
          httproute:
            enabled: true
            parentRefs:
              - name: internal-beaver-cloud
                namespace: envoy-gateway-system
            hostnames: [longhorn.beaver-cloud.xyz]
          longhornManager:
            serviceAnnotations:
              prometheus.io/scrape: 'true'
              prometheus.io/port: '9500'
    - repoURL: https://github.com/kevindurb/k8s.git
      targetRevision: HEAD
      path: infrastructure/longhorn
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
