---
metrics: true
storage:
  type: sqlite
  path: /config/data.db

endpoints:
  - name: gatus
    url: http://gatus-app-service
    group: infrastructure
    conditions: ['[STATUS] == 200']

  - name: google
    url: https://google.com
    group: external
    conditions: ['[STATUS] == 200']

  - name: github
    url: https://github.com
    group: external
    conditions: ['[STATUS] == 200']

  - name: firefox portal
    url: http://detectportal.firefox.com/success.txt
    group: external
    conditions: ['[STATUS] == 200']

  - name: router
    url: https://192.168.1.1
    group: networking
    client: { insecure: true }
    conditions: ['[STATUS] == 200']

  - name: Garage AP
    url: http://192.168.1.2
    group: networking
    conditions: ['[STATUS] == 200']

  - name: Basement AP
    url: http://192.168.1.3
    group: networking
    conditions: ['[STATUS] == 200']

  - name: Backyard AP
    url: http://192.168.1.4
    group: networking
    conditions: ['[STATUS] == 200']

  - name: Doorbell Camera
    url: http://192.168.50.1
    group: cameras
    conditions: ['[STATUS] == 200']

  - name: Garage Camera
    url: http://192.168.50.2
    group: cameras
    conditions: ['[STATUS] == 200']

  - name: Living Room Camera
    url: http://192.168.50.11
    group: cameras
    conditions: ['[STATUS] == 200']

  - name: cloudflare dns
    url: 1.1.1.1
    group: dns
    dns:
      query-name: cloudflare.com
      query-type: A
    conditions:
      - '[DNS_RCODE] == NOERROR'
      - 'len([BODY]) > 0'
