---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels: &labels
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      serviceAccountName: service-account
      hostname: prometheus
      volumes:
        - name: volume
          persistentVolumeClaim:
            claimName: app-volume
        - name: config
          configMap:
            name: config
        - name: rules
          configMap:
            name: rules
      containers:
        - name: prometheus
          image: docker.io/prom/prometheus:v3.9.1@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=5d
            - --storage.tsdb.retention.size=20GB
            - --web.external-url=https://prometheus.beaver-cloud.xyz
          resources:
            limits:
              memory: 2G
            requests:
              memory: 1G
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: volume
              mountPath: /prometheus
          ports:
            - name: http
              containerPort: 9090
