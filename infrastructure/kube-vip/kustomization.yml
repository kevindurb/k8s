---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-vip
namePrefix: kube-vip-

resources:
  - https://kube-vip.io/manifests/rbac.yaml
  - ./kube-vip.yml

components:
